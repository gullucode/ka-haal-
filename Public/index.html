<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ka Haal !! ~ GulluCode</title>
    <meta name="google-site-verification" content="ct6-B5LOlmoS2xh2lOs6qZzpNiMO91eLyJ5yuYn5D3Y" />    
    <link rel="icon" type="image/x-icon" href="Untitled_design-removebg-preview.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #708090;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #5499c7;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            margin-top: 60px;
            overflow: hidden;
        }

        .chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            background: #708090;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
    max-width: 70%; /* Ensure messages stay within the chat box */
    padding: 10px 15px;
    border-radius: 30px;
    margin-bottom: 10px;
    font-size: 16px;
    line-height: 1.4;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    word-wrap: break-word; /* Prevents overflow */
    overflow-wrap: break-word; /* Breaks long words to fit within the bubble */
    color: #333; /* Darker text for readability */
}

/* For your messages */
.my-message {
    background-color: #7fb3d5;
    align-self: flex-end;
    border-radius: 15px 15px 0 15px; /* Customize bubble shape */
}

/* For other users' messages */
.other-message {
    background-color: #ffffff;
    align-self: flex-start;
    border-radius: 15px 15px 15px 0; /* Customize bubble shape */
}

        .username {
            font-weight: bold;
            margin-bottom: 5px;
            color: #FFCC00;
        }

        .message-input-container {
    display: flex;
    align-items: center;
    padding: 2px 5px;
    color: white;
    background-color: black; /* Button-like background color */
    border-radius: 30px; /* Rounded corners */
    border: 1px solid #5499c7; /* Border similar to a button */
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* Button-like shadow */
    position: sticky;
    bottom: 20px;
    margin: 5px; /* Space around the container */
                }

        textarea {
    width: calc(100% - 120px); /* Adjust width for space around buttons */
    height: 45px;
    padding: 4px 5px;
    border: 1px solid black;
    border-radius: 2px;
    resize: none;
    font-size: 16px;
    background-color: black;
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    overflow: hidden; /* Hides the scrollbar */
}

textarea::placeholder {
    color: white;
    font-style: italic;
    font-weight: 400;
    text-shadow: 0.5px 0.5px 1px rgba(0, 0, 0, 0.1);
            }

textarea:focus {
    color: white;
    border-color: black; /* Highlighted border on focus */
    box-shadow: 0 0 5px rgba(7, 94, 84, 0.3); /* Outer shadow for focus effect */
    outline: none;
}

        .message-input-container button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: #5499c7;
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .message-input-container button:hover {
            background-color: #5499c7;
            transform: scale(1.05);
        }

        #join-button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: #5499c7;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        #join-button:hover {
            background-color: #5499c7;
            transform: scale(1.05);
        }

        .emoji-keyboard {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 10px;
            background: black;
            border: 1px solid #5499c7;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            width: 300px;
        }

        .emoji {
            cursor: pointer;
            font-size: 24px;
            transition: transform 0.2s;
        }

        .emoji:hover {
            transform: scale(1.2); /* Emoji hover effect */
        }

        #emoji-button {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%; /* Makes it circular */
    background-color: #5499c7;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: white;
    margin: 0 2px;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

#emoji-button:hover {
    background-color: black;
    transform: scale(1.1);
}

#emoji-button:active {
    background-color: #d0d0d0;
    transform: scale(1);
}

        #username-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #username-input {
            padding: 10px;
            border: 5px solid #5499c7;
            border-radius: 20px;
            margin-bottom: 10px;
            width: 300px;
        }
    </style>
</head>
<body>
    <header>
        ka Haal !! 
    </header>

    <div id="username-container">
        <input type="text" id="username-input" placeholder="Enter your username">
        <button id="join-button">Join Chat</button>
    </div>

    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="chat-box" id="chat-box"></div>
        <div class="message-input-container">
            <button id="emoji-button">😊</button>
            <textarea id="message-input" placeholder="Messaging..."></textarea>
            <button id="send-button">Send</button>
            <div class="emoji-keyboard" id="emoji-keyboard">
                <span class="emoji" onclick="sendEmoji('😀')">😀</span>
                <span class="emoji" onclick="sendEmoji('😂')">😂</span>
                <span class="emoji" onclick="sendEmoji('😍')">😍</span>
                <span class="emoji" onclick="sendEmoji('😢')">😢</span>
                <span class="emoji" onclick="sendEmoji('😡')">😡</span>
                <span class="emoji" onclick="sendEmoji('😘')">😘</span>
                <span class="emoji" onclick="sendEmoji('🤗')">🤗</span>
                <span class="emoji" onclick="sendEmoji('👍')">👍</span>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const usernameInput = document.getElementById('username-input');
        const joinButton = document.getElementById('join-button');
        const chatContainer = document.getElementById('chat-container');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const emojiButton = document.getElementById('emoji-button');
        const emojiKeyboard = document.getElementById('emoji-keyboard');

        joinButton.onclick = function() {
            const username = usernameInput.value.trim();
            if (username) {
                socket.emit('join', username);
                document.getElementById('username-container').style.display = 'none';
                chatContainer.style.display = 'flex';
            } else {
                alert('Please enter a username');
            }
        };

        sendButton.onclick = function() {
            const message = messageInput.value.trim();
            if (message) {
                socket.emit('chat message', { username: usernameInput.value, message });
                messageInput.value = '';
            }
        };

        emojiButton.onclick = function() {
            emojiKeyboard.style.display = emojiKeyboard.style.display === 'none' ? 'flex' : 'none';
        };

        function sendEmoji(emoji) {
            socket.emit('chat message', { username: usernameInput.value, message: emoji });
            emojiKeyboard.style.display = 'none';
        }

        messageInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendButton.click();
            }
        });

        socket.on('chat message', function(data) {
            const messageElement = document.createElement('div');
            messageElement.className = 'message ' + (data.username === usernameInput.value ? 'my-message' : 'other-message');
            messageElement.innerHTML = `<span class="username">${data.username}</span>: ${data.message}`;
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
